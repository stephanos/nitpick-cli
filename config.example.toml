[agent]
provider = "claude"
# model = "claude-opus-4-6"
# command = "claude"
github_command = "gh"
# checkout_dir = "/Users/you/.local/share/nitpick-agent/checkouts"

[agent.sandbox]
mode = "macos-seatbelt"

# To use Codex instead:
# provider = "codex"
# model = "gpt-5.3-codex"
# command = "codex"

[sources.github.discovery]
enabled = false
auto_review = false
interval_seconds = 300
allowlist = []
denylist = []
