name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          rustc --version
          cargo --version

      - name: Run checks
        run: |
          mise trust -y mise.toml
          mise install
          mise run verify
