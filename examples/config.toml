[agent]
provider = "claude"
# model = "claude-opus-4-6"
# command = "claude"
sandbox = "macos-seatbelt"

# To use Codex instead:
# provider = "codex"
# model = "gpt-5.3-codex"
# command = "codex"

[reviews]
max_concurrent = 3
# Review prompt loaded by the daemon before starting each review.
# Relative paths are resolved next to this config file.
# The default review-prompt.md file is refreshed on every daemon start.
prompt_path = "review-prompt.md"
# Optional instructions appended to the loaded review prompt.
extra_instructions = ""

[github]
command = "gh"
discovery = false
auto_review = false
interval_seconds = 60
# Only discover review requests whose repository matches one of these patterns.
# Empty allowlist means all repositories are allowed. Patterns match "owner/repo".
# Examples: "acme/platform", "acme/*".
allowlist = []
# Exclude review requests whose repository matches one of these patterns.
# Denylist is applied after allowlist, so a deny match always wins.
# Examples: "*/archive-*", "legacy/*".
denylist = []
